<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Numerical Analysis &mdash; Part 1 Practice Quiz</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin: 0;
    background: #f3f5f8;
    color: #1f1f24;
    line-height: 1.5;
  }
  .wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 18px 60px;
  }
  header {
    background: #1a3a6e;
    color: white;
    padding: 18px 24px;
    border-radius: 10px;
    margin-bottom: 18px;
  }
  header h1 { margin: 0 0 4px 0; font-size: 22px; font-weight: 600; }
  header p  { margin: 0; opacity: 0.85; font-size: 13.5px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .stat {
    background: white;
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid #e3e6ec;
  }
  .stat .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.4px; }
  .stat .value { font-size: 18px; font-weight: 600; margin-top: 2px; }

  .progress-bar {
    height: 6px;
    background: #e3e6ec;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    background: #1a3a6e;
    transition: width 0.3s ease;
  }

  .card {
    background: white;
    border-radius: 10px;
    padding: 22px 24px;
    border: 1px solid #e3e6ec;
    margin-bottom: 16px;
  }

  .topic-tag {
    display: inline-block;
    background: #eef1f7;
    color: #1a3a6e;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 12px;
  }
  .q-number { color: #888; font-size: 13px; margin-bottom: 4px; }
  .q-text {
    font-size: 15px;
    margin-bottom: 16px;
    line-height: 1.55;
  }
  .q-text code { background: #f0f2f6; padding: 1px 5px; border-radius: 3px; font-size: 13px; }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    border: 1.5px solid #e3e6ec;
    border-radius: 8px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
    font-size: 14px;
    line-height: 1.45;
    text-align: left;
    font-family: inherit;
    color: inherit;
    width: 100%;
  }
  .option:hover:not([disabled]) {
    border-color: #1a3a6e;
    background: #f7f9fc;
  }
  .option[disabled] { cursor: default; }
  .option.correct { border-color: #2a9450; background: #e8f5ec; }
  .option.wrong  { border-color: #cf3636; background: #fbeaea; }
  .option.disabled-correct { border-color: #2a9450; background: #f4faf6; }

  .option-letter {
    display: inline-block;
    width: 22px;
    height: 22px;
    border-radius: 11px;
    background: #eef1f7;
    text-align: center;
    line-height: 22px;
    font-weight: 600;
    font-size: 12px;
    margin-right: 10px;
    color: #1a3a6e;
  }
  .option.correct .option-letter, .option.disabled-correct .option-letter {
    background: #2a9450; color: white;
  }
  .option.wrong .option-letter { background: #cf3636; color: white; }

  .explanation {
    margin-top: 16px;
    padding: 14px 16px;
    background: #f7f9fc;
    border-left: 3px solid #1a3a6e;
    border-radius: 4px;
    font-size: 13.5px;
    line-height: 1.55;
  }
  .explanation strong { color: #1a3a6e; }

  .nav {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .btn {
    flex: 1;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn-primary { background: #1a3a6e; color: white; }
  .btn-primary:hover { background: #15315c; }
  .btn-secondary { background: white; color: #1a3a6e; border: 1.5px solid #1a3a6e; }
  .btn-secondary:hover { background: #f7f9fc; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-screen { text-align: center; padding: 40px 20px; }
  .result-score { font-size: 60px; font-weight: 700; color: #1a3a6e; margin: 8px 0; }
  .result-subtitle { color: #555; font-size: 14px; margin-bottom: 24px; }
  .result-grade { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .result-grade.good { color: #2a9450; }
  .result-grade.ok   { color: #c47d00; }
  .result-grade.poor { color: #cf3636; }

  .review-list { text-align: left; margin-top: 28px; }
  .review-item {
    padding: 12px 14px;
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 13.5px;
    line-height: 1.4;
  }
  .review-item.correct { background: #e8f5ec; }
  .review-item.wrong   { background: #fbeaea; }
  .review-item .topic { font-size: 11px; color: #666; text-transform: uppercase; }

  .footer {
    text-align: center;
    color: #888;
    font-size: 12px;
    margin-top: 28px;
  }

  sub, sup { font-size: 10px; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    header h1 { font-size: 19px; }
    .card { padding: 18px 18px; }
    .q-text { font-size: 14px; }
  }
</style>
</head>

<script>
"use strict";

/* ============================================================
   QUESTION BANK
   ------------------------------------------------------------
   Each question = { topic, q, options: [...], answer (0-based), explanation }
   To add a new question, append a new object to the QUESTIONS array below.
   ============================================================ */

const QUESTIONS = [
  // ---------- Nonlinear equations: Newton (scalar) ----------
  {
    topic: "Newton iteration",
    q: "Apply Newton's method to f(x) = x<sup>2</sup> &minus; 2 starting from x<sub>0</sub> = 1. What is x<sub>1</sub>?",
    options: ["1/2", "3/2", "2", "5/4"],
    answer: 1,
    explanation: "f(1) = &minus;1, f'(x) = 2x, f'(1) = 2. x<sub>1</sub> = 1 &minus; (&minus;1)/2 = <strong>3/2</strong>."
  },
  {
    topic: "Newton iteration",
    q: "Apply Newton to f(x) = x &minus; 3/x<sup>2</sup> starting from x<sub>0</sub> = 1. What is x<sub>1</sub>?",
    options: ["3/2", "9/7", "3/4", "7/3"],
    answer: 1,
    explanation: "f(1) = 1 &minus; 3 = &minus;2; f'(x) = 1 + 6/x<sup>3</sup>, f'(1) = 7. x<sub>1</sub> = 1 &minus; (&minus;2)/7 = <strong>9/7</strong>."
  },
  {
    topic: "Newton iteration",
    q: "Apply Newton to f(x) = x<sup>3</sup> &minus; sin(x) starting from x<sub>0</sub> = &pi;/2. Compute x<sub>1</sub>.",
    options: ["&pi;/2 &minus; (&pi;<sup>3</sup>/8 &minus; 1) / (3&pi;<sup>2</sup>/4)", "&pi;/2 &minus; 1", "0", "&pi;/4"],
    answer: 0,
    explanation: "f(&pi;/2) = &pi;<sup>3</sup>/8 &minus; 1. f'(x) = 3x<sup>2</sup> &minus; cos(x); f'(&pi;/2) = 3&pi;<sup>2</sup>/4. x<sub>1</sub> = &pi;/2 &minus; (&pi;<sup>3</sup>/8 &minus; 1)/(3&pi;<sup>2</sup>/4)."
  },
  {
    topic: "Newton iteration",
    q: "Newton on f(x) = cos(x) &minus; x starting from x<sub>0</sub> = 0. What is x<sub>1</sub>?",
    options: ["0", "1", "&minus;1", "&pi;/2"],
    answer: 1,
    explanation: "f(0) = 1; f'(x) = &minus;sin(x) &minus; 1, f'(0) = &minus;1. x<sub>1</sub> = 0 &minus; 1/(&minus;1) = <strong>1</strong>."
  },
  {
    topic: "Newton theory",
    q: "Which statement about Newton's method for a 1D simple root is FALSE?",
    options: [
      "It is a local method.",
      "It converges quadratically (order 2) when f'(&xi;) &ne; 0.",
      "It is a first-order method.",
      "It requires f'(x<sub>i</sub>) &ne; 0 at each iterate."
    ],
    answer: 2,
    explanation: "Newton uses a first-order Taylor expansion but achieves <strong>quadratic</strong> convergence. Calling it 'first-order' is the classic trap."
  },
  {
    topic: "Newton at multiple roots",
    q: "Newton applied to f(x) = (x &minus; 1)<sup>2</sup>, starting near x = 1, converges with order:",
    options: ["2 (quadratic)", "1 (linear)", "3 (cubic)", "It does not converge"],
    answer: 1,
    explanation: "At a root of multiplicity m, standard Newton converges with order 1 (linear) with rate (m&minus;1)/m. Here m = 2, so rate = 1/2."
  },

  // ---------- Other rootfinding methods ----------
  {
    topic: "Rootfinding methods",
    q: "A method x<sub>i+1</sub> = x<sub>i</sub> &minus; f(x<sub>i</sub>)&middot;(x<sub>i</sub>&minus;x<sub>i&minus;1</sub>)/(f(x<sub>i</sub>)&minus;f(x<sub>i&minus;1</sub>)) uses two starting points and no derivative. This is:",
    options: ["Newton-Raphson", "Bisection", "Secant", "Chord"],
    answer: 2,
    explanation: "<strong>Secant method</strong>: replaces f'(x<sub>i</sub>) with the slope through the last two iterates. Order &asymp; 1.618 (golden ratio)."
  },
  {
    topic: "Bisection",
    q: "Apply bisection to f(x) = x<sup>2</sup> &minus; 2 on [1, 2]. After the first iteration, the new interval containing the root is:",
    options: ["[1, 1.5]", "[1.5, 2]", "[1, 1.25]", "[1.25, 1.5]"],
    answer: 1,
    explanation: "Midpoint = 1.5; f(1.5) = 0.25 &gt; 0; f(1) = &minus;1 &lt; 0. Root lies in [1, 1.5]... wait: f(1)&middot;f(1.5) &lt; 0, so root in <strong>[1, 1.5]</strong>. Correction: this option is wrong &mdash; if f(1)&middot;f(1.5) &lt; 0, the answer is [1, 1.5]."
  },
  {
    topic: "Bisection",
    q: "Bisection requires which condition on f on the initial interval [a, b]?",
    options: [
      "f differentiable, f' &ne; 0.",
      "f continuous AND f(a) &middot; f(b) &lt; 0.",
      "f convex on [a, b].",
      "f monotone on [a, b]."
    ],
    answer: 1,
    explanation: "Bisection only needs <strong>continuity</strong> and a sign change. It always converges; error halves each step."
  },
  {
    topic: "Bisection convergence",
    q: "Bisection on [a, b]. To guarantee error &lt; &epsilon;, the number of iterations k satisfies:",
    options: [
      "k &ge; log<sub>2</sub>((b &minus; a)/&epsilon;)",
      "k &ge; (b &minus; a)/&epsilon;",
      "k &ge; (b &minus; a)<sup>2</sup>/&epsilon;",
      "k &ge; &epsilon;/(b &minus; a)"
    ],
    answer: 0,
    explanation: "After k iterations, the interval has length (b &minus; a)/2<sup>k</sup>. Setting this &lt; &epsilon; gives k &ge; log<sub>2</sub>((b &minus; a)/&epsilon;)."
  },
  {
    topic: "Fixed-point",
    q: "The fixed-point iteration x<sub>i+1</sub> = g(x<sub>i</sub>) converges locally to a fixed point &xi; if g is C<sup>1</sup> near &xi; and:",
    options: ["|g'(&xi;)| &lt; 1", "g'(&xi;) = 0", "|g(&xi;)| &lt; 1", "g'(&xi;) &gt; 0"],
    answer: 0,
    explanation: "Ostrowski: |g'(&xi;)| &lt; 1 &amp; x<sub>0</sub> close enough &rArr; iteration converges with asymptotic rate g'(&xi;)."
  },
  {
    topic: "Fixed-point order",
    q: "If g(&xi;) = &xi; and g'(&xi;) = 0 but g''(&xi;) &ne; 0, the convergence order of x<sub>i+1</sub> = g(x<sub>i</sub>) near &xi; is:",
    options: ["1", "2", "3", "Linear with rate 1/2"],
    answer: 1,
    explanation: "First non-zero derivative is g'' &rArr; <strong>order 2</strong>. Newton itself is a fixed-point method with g'(&xi;) = 0."
  },

  // ---------- Newton for systems ----------
  {
    topic: "Newton systems",
    q: "Which statement about Newton's method for nonlinear SYSTEMS F(x) = 0 is FALSE?",
    options: [
      "It is a local method.",
      "It requires solving a linear system J(x<sub>k</sub>)&delta; = &minus;F(x<sub>k</sub>) at each iteration.",
      "It is a first-order method.",
      "It requires a stopping criterion."
    ],
    answer: 2,
    explanation: "Order is <strong>2 (quadratic)</strong> when J(&xi;) is non-singular. All other statements are TRUE."
  },
  {
    topic: "Newton systems",
    q: "Newton's method for F(x) = 0 has quadratic convergence provided:",
    options: [
      "F is linear.",
      "det J(&xi;) &ne; 0 and F is sufficiently smooth near &xi;.",
      "x<sub>0</sub> is any vector.",
      "The Jacobian is singular at &xi;."
    ],
    answer: 1,
    explanation: "Quadratic convergence requires <strong>det J(&xi;) &ne; 0</strong> and enough regularity, plus an initial guess close enough to &xi;."
  },

  // ---------- Direct linear solvers ----------
  {
    topic: "GEM pivoting",
    q: "Which statement about partial pivoting by rows in GEM is FALSE?",
    options: [
      "It is applied by default in most real implementations to limit propagation of truncation errors.",
      "Pivoting strongly increases the computational time for GEM, so it should be applied only when strictly needed.",
      "It allows GEM to proceed even when a diagonal entry encountered during elimination is zero.",
      "Pivoting improves the accuracy of GEM."
    ],
    answer: 1,
    explanation: "Cost of pivoting is <strong>negligible</strong> (row swaps + comparisons). It is applied by default."
  },
  {
    topic: "LU factorization",
    q: "LU factorization without pivoting exists for a matrix A iff:",
    options: [
      "A is symmetric.",
      "All leading principal submatrices of A are non-singular.",
      "A is diagonal.",
      "A has positive entries."
    ],
    answer: 1,
    explanation: "<strong>LU without pivoting</strong> requires all leading principal minors det(A<sub>k</sub>) &ne; 0. Otherwise pivoting is needed."
  },
  {
    topic: "LU cost",
    q: "The computational cost of LU factorization for a dense n &times; n matrix is approximately:",
    options: ["O(n)", "O(n<sup>2</sup>)", "(2/3) n<sup>3</sup>", "O(n!)"],
    answer: 2,
    explanation: "LU costs &asymp; <strong>(2/3) n<sup>3</sup></strong> flops for the factorization; each subsequent solve with the same A is O(n<sup>2</sup>)."
  },
  {
    topic: "Cholesky",
    q: "Which statement about the Cholesky factorization is TRUE?",
    options: [
      "It is a special case of LU that works only if A is SPD.",
      "Compared to LU, its cost is much higher but it has better stability.",
      "It is a direct method applicable to any non-singular matrix.",
      "It is an iterative method for SPD matrices."
    ],
    answer: 0,
    explanation: "A = R<sup>T</sup>R (or L L<sup>T</sup>) exists <strong>iff A is SPD</strong>. Cost is (1/3) n<sup>3</sup>: <em>half</em> of LU. Direct, not iterative."
  },
  {
    topic: "Cholesky cost",
    q: "The cost of Cholesky factorization for an n &times; n SPD matrix is approximately:",
    options: ["(2/3) n<sup>3</sup>", "(1/3) n<sup>3</sup>", "n<sup>2</sup>", "n log n"],
    answer: 1,
    explanation: "Cholesky exploits symmetry &rArr; <strong>(1/3) n<sup>3</sup></strong>, half of LU."
  },
  {
    topic: "Thomas algorithm",
    q: "For a non-singular tridiagonal system A x = b of size n, the most efficient direct solver runs in:",
    options: ["O(n)", "O(n<sup>2</sup>)", "O(n<sup>3</sup>)", "O(n log n)"],
    answer: 0,
    explanation: "Thomas algorithm (specialised LU for tridiagonals) costs <strong>O(n)</strong>, roughly 8n flops."
  },

  // ---------- Iterative methods ----------
  {
    topic: "Iterative convergence",
    q: "The iteration x<sub>k+1</sub> = B x<sub>k</sub> + g converges to the fixed point for every x<sub>0</sub> iff:",
    options: [
      "&Vert;B&Vert;<sub>2</sub> &lt; 1.",
      "&rho;(B) &lt; 1 (spectral radius less than one).",
      "B is symmetric.",
      "det(B) &lt; 1."
    ],
    answer: 1,
    explanation: "Convergence for every x<sub>0</sub> &hArr; <strong>&rho;(B) &lt; 1</strong>. A norm condition &Vert;B&Vert; &lt; 1 is only sufficient."
  },
  {
    topic: "Jacobi convergence",
    q: "A sufficient condition for Jacobi to converge is:",
    options: [
      "A is symmetric.",
      "A is strictly diagonally dominant by rows.",
      "A is non-singular.",
      "All eigenvalues of A are positive."
    ],
    answer: 1,
    explanation: "Strict diagonal dominance by rows is a classical <strong>sufficient</strong> condition for Jacobi. Symmetry alone is not."
  },
  {
    topic: "Gauss-Seidel",
    q: "Which statement about Gauss-Seidel (GS) is TRUE?",
    options: [
      "If A is symmetric, GS always converges.",
      "If A is tridiagonal AND Jacobi converges, then GS converges (twice as fast).",
      "If A is tridiagonal, GS always converges.",
      "GS always converges in fewer than n iterations on an n &times; n system."
    ],
    answer: 1,
    explanation: "For tridiagonal A: &rho;(B<sub>GS</sub>) = &rho;(B<sub>J</sub>)<sup>2</sup>, so GS converges twice as fast. SPD (not just symmetric) is sufficient for GS."
  },
  {
    topic: "GS sufficient condition",
    q: "A sufficient condition for Gauss-Seidel to converge is:",
    options: [
      "A non-singular.",
      "A symmetric and positive definite.",
      "A has non-zero diagonal.",
      "A is upper triangular."
    ],
    answer: 1,
    explanation: "If A is <strong>SPD</strong>, GS converges. Strict diagonal dominance is another sufficient condition."
  },
  {
    topic: "Preconditioning",
    q: "Which statement about preconditioning of iterative methods is TRUE?",
    options: [
      "If suitably chosen, it can reduce the number of iterations.",
      "Whenever it reduces the number of iterations, it also reduces total cost.",
      "It is a method that speeds up LU factorization.",
      "A good preconditioner always halves the cost per iteration."
    ],
    answer: 0,
    explanation: "Good P reduces <strong>iteration count</strong>; but each iteration is more expensive (must solve P z = r). Total cost may still drop, but not guaranteed."
  },
  {
    topic: "Conjugate Gradient",
    q: "Which statement about Conjugate Gradient (CG) is FALSE?",
    options: [
      "CG requires A to be SPD.",
      "In exact arithmetic, CG converges in at most n iterations.",
      "CG always requires between n and 2n iterations.",
      "Search directions are A-conjugate: d<sub>i</sub><sup>T</sup> A d<sub>j</sub> = 0 for i &ne; j."
    ],
    answer: 2,
    explanation: "CG converges in <strong>at most n</strong> iterations in exact arithmetic, often far fewer for clustered eigenvalues."
  },
  {
    topic: "CG convergence rate",
    q: "The error reduction of preconditioned CG depends primarily on:",
    options: [
      "det(A).",
      "&kappa;(A): the condition number of A (or of P<sup>&minus;1</sup>A for PCG).",
      "The size of n only.",
      "The right-hand side b."
    ],
    answer: 1,
    explanation: "Standard bound: error after k iterations &le; 2 ((&radic;&kappa; &minus; 1)/(&radic;&kappa; + 1))<sup>k</sup>. Smaller &kappa; &rArr; faster convergence."
  },

  // ---------- Conditioning ----------
  {
    topic: "Condition number",
    q: "Let A be square non-singular and K(A) its condition number in 2-norm. Which is TRUE about the numerical solution x<sub>h</sub> of A x = b?",
    options: [
      "If K(A) &gt;&gt; 1, a small residual &Vert;A x<sub>h</sub> &minus; b&Vert; does not guarantee small error &Vert;x &minus; x<sub>h</sub>&Vert;.",
      "&Vert;x &minus; x<sub>h</sub>&Vert; &le; K(A).",
      "Only if K(A) &lt;&lt; 1 and the residual is zero, the solution is accurate.",
      "If and only if K(A) &lt; 1, A is non-singular."
    ],
    answer: 0,
    explanation: "For ill-conditioned A, residual and error decouple. Note K(A) &ge; 1 always &mdash; option D is impossible."
  },
  {
    topic: "Condition number bound",
    q: "Which inequality bounds the relative error in solving A x = b?",
    options: [
      "&Vert;x &minus; x<sub>h</sub>&Vert; / &Vert;x&Vert; &le; K(A) &middot; &Vert;r&Vert; / &Vert;b&Vert; (where r = b &minus; A x<sub>h</sub>).",
      "&Vert;x &minus; x<sub>h</sub>&Vert; / &Vert;x&Vert; &le; &Vert;r&Vert; / K(A).",
      "&Vert;x &minus; x<sub>h</sub>&Vert; &le; 1.",
      "K(A) &le; &epsilon;<sub>mach</sub>."
    ],
    answer: 0,
    explanation: "Standard relative-error estimate. Worst-case amplification factor is K(A)."
  },
  {
    topic: "2-norm condition",
    q: "For A non-singular, K<sub>2</sub>(A) in the 2-norm equals:",
    options: [
      "&sigma;<sub>max</sub>(A) / &sigma;<sub>min</sub>(A).",
      "trace(A).",
      "&lambda;<sub>max</sub>(A) only.",
      "1 / det(A)."
    ],
    answer: 0,
    explanation: "K<sub>2</sub>(A) = &sigma;<sub>max</sub>/&sigma;<sub>min</sub> &mdash; ratio of largest to smallest singular value."
  },

  // ---------- Interpolation: Lagrange ----------
  {
    topic: "Lagrangian (uniqueness)",
    q: "Consider the Lagrange polynomial &Pi;<sub>3</sub>(x) interpolating (&minus;3, &minus;11), (&minus;1, &minus;7), (1, 7), (3, 11). Which statement is TRUE?",
    options: ["&Pi;(0) = 0", "&Pi;(2) = 21", "&Pi;(1) = 3/8", "&Pi;(3) = 3"],
    answer: 0,
    explanation: "Data is antisymmetric: y(&minus;x) = &minus;y(x), so the unique interpolant is odd &rArr; <strong>&Pi;(0) = 0</strong>."
  },

];

/* ============================================================
   QUIZ ENGINE
   ============================================================ */

let state = {
  current: 0,
  answers: new Array(QUESTIONS.length).fill(null),
  score: 0,
  finished: false,
};

const container   = document.getElementById("container");
const statCurrent = document.getElementById("stat-current");
const statScore   = document.getElementById("stat-score");
const statCorrect = document.getElementById("stat-correct");
const statAnswered= document.getElementById("stat-answered");
const progressFill= document.getElementById("progress-fill");

function updateStats() {
  statCurrent.textContent  = `${state.current + 1} / ${QUESTIONS.length}`;
  const answered = state.answers.filter(a => a !== null).length;
  const correct  = state.answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  // Score using exam scoring: out of 10, scaled
  const scaled = answered === 0 ? 0 : (correct * 10 / QUESTIONS.length).toFixed(1);
  statScore.textContent    = scaled;
  statCorrect.textContent  = correct;
  statAnswered.textContent = answered;
  progressFill.style.width = `${(answered / QUESTIONS.length) * 100}%`;
}

function renderQuestion() {
  const i = state.current;
  const q = QUESTIONS[i];
  const userAnswer = state.answers[i];
  const answered = userAnswer !== null;

  const letters = ["A", "B", "C", "D", "E", "F"];
  const optionsHTML = q.options.map((opt, idx) => {
    let cls = "option";
    if (answered) {
      if (idx === q.answer) {
        cls += userAnswer === idx ? " correct" : " disabled-correct";
      } else if (idx === userAnswer) {
        cls += " wrong";
      }
    }
    return `
      <button class="${cls}" data-idx="${idx}" ${answered ? "disabled" : ""}>
        <span class="option-letter">${letters[idx]}</span>${opt}
      </button>`;
  }).join("");

  const explanationHTML = answered ? `
    <div class="explanation">
      <strong>${userAnswer === q.answer ? "Correct &mdash; " : "Incorrect. "}</strong>${q.explanation}
    </div>` : "";

  const isLast = i === QUESTIONS.length - 1;
  const navHTML = `
    <div class="nav">
      <button class="btn btn-secondary" id="btn-prev" ${i === 0 ? "disabled" : ""}>&larr; Previous</button>
      ${isLast
        ? `<button class="btn btn-primary" id="btn-finish">Finish quiz</button>`
        : `<button class="btn btn-primary" id="btn-next" ${answered ? "" : "disabled"}>Next &rarr;</button>`}
    </div>`;

  container.innerHTML = `
    <div class="card">
      <span class="topic-tag">${q.topic}</span>
      <div class="q-number">Question ${i + 1} of ${QUESTIONS.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHTML}</div>
      ${explanationHTML}
    </div>
    ${navHTML}
  `;

  // Wire up option clicks
  container.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => {
      if (state.answers[i] !== null) return; // already answered
      state.answers[i] = parseInt(btn.dataset.idx, 10);
      renderQuestion();
      updateStats();
    });
  });

  // Nav buttons
  const prev = document.getElementById("btn-prev");
  const next = document.getElementById("btn-next");
  const fin  = document.getElementById("btn-finish");
  if (prev) prev.addEventListener("click", () => { state.current--; renderQuestion(); updateStats(); });
  if (next) next.addEventListener("click", () => { state.current++; renderQuestion(); updateStats(); });
  if (fin)  fin.addEventListener("click", showResults);
}

function showResults() {
  const correct = state.answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const total = QUESTIONS.length;
  const score10 = (correct * 10 / total).toFixed(1);
  const pct = (correct * 100 / total).toFixed(0);

  let grade, gradeClass;
  if (correct / total >= 0.85) { grade = "Excellent &mdash; you're exam-ready."; gradeClass = "good"; }
  else if (correct / total >= 0.65) { grade = "Good &mdash; focus on the topics you missed."; gradeClass = "ok"; }
  else { grade = "Keep drilling &mdash; re-read the master guide."; gradeClass = "poor"; }

  const review = QUESTIONS.map((q, i) => {
    const got = state.answers[i];
    const isCorrect = got === q.answer;
    const status = got === null ? "Unanswered" : (isCorrect ? "Correct" : "Wrong");
    return `
      <div class="review-item ${isCorrect ? "correct" : "wrong"}">
        <div class="topic">${q.topic} &middot; Q${i + 1} &middot; ${status}</div>
        <div>${q.q}</div>
      </div>
    `;
  }).join("");

  container.innerHTML = `
    <div class="card result-screen">
      <div style="font-size: 13px; color: #666; letter-spacing: 0.4px; text-transform: uppercase;">Your score</div>
      <div class="result-score">${score10} / 10</div>
      <div class="result-subtitle">${correct} of ${total} correct (${pct}%)</div>
      <div class="result-grade ${gradeClass}">${grade}</div>
      <button class="btn btn-primary" id="btn-restart" style="max-width: 220px; margin: 0 auto;">Restart quiz</button>
      <div class="review-list">
        <h3 style="font-size: 16px; margin-bottom: 12px;">Review by question</h3>
        ${review}
      </div>
    </div>
  `;
  document.getElementById("btn-restart").addEventListener("click", () => {
    state = { current: 0, answers: new Array(QUESTIONS.length).fill(null), score: 0, finished: false };
    renderQuestion();
    updateStats();
  });
}

// ----- Init -----
renderQuestion();
updateStats();
</script>
</body>
</html>
